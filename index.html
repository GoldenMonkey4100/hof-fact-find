<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>HOF Broker Fact Find</title>
    <!-- Google Places Autocomplete -->
    <!-- Bridge: components subscribe before the library is ready; callback fires when it is -->
    <script>
      window.__mapsReady  = false;
      window.__mapsQueue  = [];
      window.__onMapsLoad = function () {
        window.__mapsReady = true;
        window.__mapsQueue.forEach(function (fn) { try { fn(); } catch(e){} });
        window.__mapsQueue = [];
      };
    </script>
    <script async
      src="https://maps.googleapis.com/maps/api/js?key=AIzaSyBTP37vnk9PaznM-XdYj4t6x6MZD9pajgc&libraries=places&callback=__onMapsLoad">
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
