<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HOF Broker Fact Find - UI Preview</title>
  <style>
    /* Design System CSS - Inline for demo */
    :root {
      --color-primary: #0066CC;
      --color-primary-hover: #0052A3;
      --color-primary-light: #E6F2FF;
      --color-success: #10B981;
      --color-success-light: #D1FAE5;
      --color-success-dark: #065F46;
      --color-warning: #F59E0B;
      --color-warning-light: #FEF3C7;
      --color-info: #3B82F6;
      --color-info-light: #DBEAFE;
      --color-info-dark: #1E40AF;
      --color-gray-50: #F9FAFB;
      --color-gray-100: #F3F4F6;
      --color-gray-200: #E5E7EB;
      --color-gray-300: #D1D5DB;
      --color-gray-500: #6B7280;
      --color-gray-900: #111827;
      --bg-primary: #FFFFFF;
      --bg-secondary: #F9FAFB;
      --bg-tertiary: #F3F4F6;
      --text-primary: #111827;
      --text-secondary: #6B7280;
      --text-tertiary: #9CA3AF;
      --border-primary: #E5E7EB;
      --border-secondary: #D1D5DB;
      --border-focus: #0066CC;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      --radius-md: 8px;
      --radius-lg: 12px;
      --radius-full: 9999px;
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-focus: 0 0 0 3px rgba(0, 102, 204, 0.2);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: var(--font-sans);
      font-size: 16px;
      color: var(--text-primary);
      background: var(--bg-tertiary);
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 32px 16px;
    }

    .card {
      background: var(--bg-primary);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-lg);
      padding: 24px;
      margin-bottom: 24px;
      transition: all 0.2s ease;
    }

    .card:hover {
      box-shadow: var(--shadow-md);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 8px 16px;
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-full);
    }

    .badge-info {
      color: var(--color-info-dark);
      background: var(--color-info-light);
    }

    .progress-bar {
      width: 100%;
      height: 8px;
      background: var(--bg-secondary);
      border-radius: var(--radius-full);
      overflow: hidden;
      margin-top: 24px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--color-primary), #0080FF);
      border-radius: var(--radius-full);
      transition: width 0.3s ease;
    }

    .step-btn {
      flex: 1;
      min-width: 160px;
      padding: 16px;
      font-family: var(--font-sans);
      font-size: 14px;
      font-weight: 500;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
      text-align: left;
    }

    .step-btn.active {
      border: 2px solid var(--color-primary);
      background: var(--color-primary-light);
      color: var(--color-primary);
    }

    .step-btn.completed {
      border: 2px solid var(--color-success);
      background: var(--color-success-light);
      color: var(--color-success);
    }

    .step-btn.pending {
      border: 2px solid var(--border-primary);
      background: white;
      color: var(--text-secondary);
    }

    .step-number {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 32px;
      height: 32px;
      font-size: 14px;
      font-weight: 600;
      border-radius: var(--radius-full);
      margin-right: 12px;
    }

    .step-number.active {
      background: var(--color-primary);
      color: white;
    }

    .step-number.completed {
      background: var(--color-success);
      color: white;
    }

    .step-number.pending {
      background: var(--bg-secondary);
      color: var(--text-tertiary);
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 16px;
      font-size: 15px;
      font-family: var(--font-sans);
      border: 1px solid var(--border-primary);
      border-radius: var(--radius-md);
      transition: all 0.2s ease;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--border-focus);
      box-shadow: var(--shadow-focus);
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .btn {
      padding: 12px 24px;
      font-family: var(--font-sans);
      font-size: 15px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius-md);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-primary {
      color: white;
      background: var(--color-primary);
      border: 2px solid var(--color-primary);
    }

    .btn-primary:hover {
      background: var(--color-primary-hover);
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .btn-secondary {
      color: var(--text-primary);
      background: white;
      border: 1px solid var(--border-primary);
    }

    .btn-secondary:hover {
      background: var(--bg-secondary);
    }

    .btn-success {
      color: white;
      background: var(--color-success);
      border: 2px solid var(--color-success);
    }

    .btn-success:hover {
      background: #059669;
      transform: translateY(-1px);
      box-shadow: var(--shadow-md);
    }

    .grid {
      display: grid;
      gap: 16px;
    }

    .grid-cols-2 {
      grid-template-columns: repeat(2, 1fr);
    }

    .grid-cols-3 {
      grid-template-columns: repeat(3, 1fr);
    }

    @media (max-width: 768px) {
      .grid-cols-2, .grid-cols-3 {
        grid-template-columns: 1fr;
      }
      .step-container {
        overflow-x: auto;
      }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
  </style>
</head>
<body>
  <div class="container">
    
    <!-- Header Card -->
    <div class="card fade-in">
      <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 16px;">
        <div>
          <h1 style="font-size: 30px; font-weight: 600; margin: 0 0 8px 0; line-height: 1.2;">
            HOF Broker Fact Find
          </h1>
          <p style="font-size: 16px; color: var(--text-secondary); margin: 0;">
            Complete all sections to submit to your processing team
          </p>
        </div>
        
        <div class="badge badge-info">
          Step 1 of 5
        </div>
      </div>

      <!-- Progress Bar -->
      <div class="progress-bar">
        <div class="progress-fill" style="width: 20%;"></div>
      </div>
      <div style="display: flex; justify-content: space-between; margin-top: 8px; font-size: 12px; color: var(--text-tertiary);">
        <span>Start</span>
        <span>20% Complete</span>
      </div>
    </div>

    <!-- Step Navigation -->
    <div class="card fade-in">
      <div class="step-container" style="display: flex; gap: 12px; overflow-x: auto;">
        
        <button class="step-btn active">
          <div style="display: flex; align-items: center;">
            <span class="step-number active">🏠</span>
            <div>
              <div style="font-size: 12px; opacity: 0.7;">Step 1</div>
              <div style="font-size: 14px; font-weight: 500;">Loan Strategy</div>
            </div>
          </div>
        </button>

        <button class="step-btn pending">
          <div style="display: flex; align-items: center;">
            <span class="step-number pending">👥</span>
            <div>
              <div style="font-size: 12px; opacity: 0.7;">Step 2</div>
              <div style="font-size: 14px; font-weight: 500;">Applicants</div>
            </div>
          </div>
        </button>

        <button class="step-btn pending">
          <div style="display: flex; align-items: center;">
            <span class="step-number pending">💼</span>
            <div>
              <div style="font-size: 12px; opacity: 0.7;">Step 3</div>
              <div style="font-size: 14px; font-weight: 500;">Employment</div>
            </div>
          </div>
        </button>

        <button class="step-btn pending">
          <div style="display: flex; align-items: center;">
            <span class="step-number pending">💰</span>
            <div>
              <div style="font-size: 12px; opacity: 0.7;">Step 4</div>
              <div style="font-size: 14px; font-weight: 500;">Assets</div>
            </div>
          </div>
        </button>

        <button class="step-btn pending">
          <div style="display: flex; align-items: center;">
            <span class="step-number pending">✓</span>
            <div>
              <div style="font-size: 12px; opacity: 0.7;">Step 5</div>
              <div style="font-size: 14px; font-weight: 500;">Review</div>
            </div>
          </div>
        </button>

      </div>
    </div>

    <!-- Step Content Card (Example: Loan Strategy fields) -->
    <div class="card" style="min-height: 500px;">
      <div style="margin-bottom: 32px;">
        <h2 style="font-size: 24px; font-weight: 600; margin: 0 0 8px 0;">
          🏠 Loan Strategy
        </h2>
        <div style="width: 60px; height: 3px; background: var(--color-primary); border-radius: 9999px;"></div>
      </div>

      <!-- Sample Form Fields -->
      <div class="grid grid-cols-2" style="margin-bottom: 24px;">
        <div>
          <label>Broker Name</label>
          <input type="text" placeholder="Enter your name">
        </div>
        <div>
          <label>Broker Email</label>
          <input type="email" placeholder="email@example.com">
        </div>
      </div>

      <div class="grid grid-cols-2" style="margin-bottom: 24px;">
        <div>
          <label>Client Type</label>
          <select>
            <option>Select...</option>
            <option>New</option>
            <option>Existing</option>
            <option>Family & Friends</option>
          </select>
        </div>
        <div>
          <label>Number of Applicants</label>
          <select>
            <option>1</option>
            <option>2</option>
            <option>3</option>
            <option>4</option>
          </select>
        </div>
      </div>

      <!-- Security Property Card -->
      <div style="background: var(--bg-secondary); padding: 20px; border-radius: var(--radius-lg); margin-bottom: 24px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
          <h3 style="font-size: 16px; font-weight: 500; margin: 0;">Security 1</h3>
          <button class="btn-secondary" style="padding: 6px 12px; font-size: 13px;">+ Add Security</button>
        </div>

        <div style="margin-bottom: 16px;">
          <label>Property Address</label>
          <input type="text" placeholder="123 Main Street, Sydney NSW 2000">
        </div>

        <div class="grid grid-cols-3" style="margin-bottom: 16px;">
          <div>
            <label>Property Value ($)</label>
            <input type="number" placeholder="750000">
          </div>
          <div>
            <label>Loan Amount ($)</label>
            <input type="number" placeholder="600000">
          </div>
          <div>
            <label>LVR (%)</label>
            <input type="text" value="80.00" readonly style="background: var(--bg-tertiary);">
          </div>
        </div>
      </div>

      <div style="margin-bottom: 24px;">
        <label>Broker Strategy Notes</label>
        <textarea rows="4" placeholder="Enter any additional notes about the loan strategy..."></textarea>
      </div>

    </div>

    <!-- Navigation Buttons -->
    <div class="card" style="display: flex; justify-content: space-between; align-items: center; padding: 20px 24px;">
      <button class="btn btn-secondary" disabled style="opacity: 0.5; cursor: not-allowed;">
        ← Previous
      </button>

      <div style="font-size: 14px; color: var(--text-secondary); font-weight: 500;">
        Step 1 of 5
      </div>

      <button class="btn btn-primary">
        Next →
      </button>
    </div>

    <!-- Help Footer -->
    <div style="margin-top: 32px; padding: 20px; text-align: center; font-size: 14px; color: var(--text-secondary); background: var(--bg-primary); border-radius: var(--radius-lg); border: 1px solid var(--border-primary);">
      <p style="margin: 0 0 8px 0;">
        Need help? Contact your Partnership Manager or email 
        <a href="mailto:helpdesk@connective.com.au" style="color: var(--color-primary); text-decoration: none; font-weight: 500;">
          helpdesk@connective.com.au
        </a>
      </p>
      <p style="margin: 0; font-size: 12px; color: var(--text-tertiary);">
        Powered by Mercury Nexus CRM • Secure & Encrypted
      </p>
    </div>

  </div>
</body>
</html>
